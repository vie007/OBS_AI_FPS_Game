; ============================================================
; Watermelon Aimbot 配置文件
; ============================================================

[Detection window]
; AI 检测窗口的宽度（像素）。只在此区域内做目标检测，值越大范围越广但越耗性能。建议 256-640
detection_window_width = 416
; AI 检测窗口的高度（像素）。与宽度共同决定 AI 的"视野"大小
detection_window_height = 416
; 是否将截取区域裁剪为圆形，边缘像素遮罩为黑色，减少边缘干扰物误检
circle_capture = False

[Capture Methods]
; 截帧频率（帧/秒），每秒从屏幕截取多少次图像送入 AI。建议不超过 120
capture_fps = 60
; 是否使用 BetterCam 截取（DXGI Desktop Duplication），延迟最低性能最好，仅 Windows 可用
; ⚠️ bettercam / obs / mss 三种截取方式只能同时启用一个
bettercam_capture = False
; BetterCam 使用的显示器编号，0 = 主显示器，1 = 副屏
bettercam_monitor_id = 0
; BetterCam 使用的 GPU 编号，0 = 第一张显卡
bettercam_gpu_id = 0
; 是否使用 OBS 虚拟摄像头截取，需先安装 OBS 并启动虚拟摄像头
obs_capture = False
; OBS 虚拟摄像头设备 ID，设为 auto 可自动搜索
obs_camera_id = 1
; 是否使用 MSS 截取（截屏方式），跨平台兼容 Windows + Linux，性能略低于 BetterCam
mss_capture = True

[Aim]
; 身体瞄准 Y 轴偏移（比例值），0.0 = 身体中心，0.1 ≈ 胸口，0.3 ≈ 上胸，0.5 ≈ 脖子
body_y_offset = 0.4
; 身体瞄准 X 轴偏移（比例值），0.0 = 框体中心。VALORANT 角色持枪导致框体左右不对称，
; 正值向右偏移，负值向左偏移。建议从 0.0 开始微调，每次 ±0.02
body_x_offset = 0.0
; 是否将靶场目标（人形靶/球靶）也作为可瞄准对象，实战中可关闭
hideout_targets = True
; 是否禁用爆头优先。False = 优先瞄准头部，True = 只瞄准身体忽略头部
disable_headshot = True
; 是否禁用运动预测。False = 根据目标速度/加速度预测未来位置提前瞄准，True = 直接瞄准当前位置
disable_prediction = False
; 运动预测时间间隔系数，值越大提前量越大。建议 1.0-3.0
prediction_interval = 2
; 预测抖动门控（像素），帧间位移小于此值时视为检测噪声，跳过预测直接使用原始位置
; 远距离小框体检测抖动通常 1-3px，设为 0 关闭此功能。建议 3.0-5.0
prediction_jitter_threshold = 5.0
; 预测偏移上限（像素），单帧预测量超过此值时等比缩放回该范围，防止异常速度导致鼠标大幅跳跃
; 值越大允许的预测越激进，值越小越保守。建议 8.0-20.0
prediction_max_offset = 15.0
; 像素颜色质心瞄准，True = 用框内像素的颜色加权质心替代框体几何中心作为瞄准 X 坐标
; 能有效修正武器延伸导致的框体中心偏移（左右偏移问题），适用于任意朝向/武器/姿态
aim_color_centroid = True

[Hotkeys]
; ⚠️ 热键支持键盘按键和鼠标按键
; 可选值:
;   键盘: 字母(A-Z)、数字(Key0-Key9)、功能键(F1-F24)、
;         方向键(LeftArrow/UpArrow/RightArrow/DownArrow)、
;         修饰键(LeftShift/LeftControl/LeftAlt/RightShift/RightControl/RightAlt)、
;         特殊键(Space/Enter/Tab/Escape/Backspace/Delete/Ins/Home/End/PageUp/PageDown)
;   鼠标: left(左键)、right(右键)、middle(中键)
; 瞄准激活键，按住时 AI 开始追踪并移动鼠标到目标
hotkey_targeting = left,right,LeftShift
; 退出键，按下后立即终止程序
hotkey_exit = F9
; 暂停键，按住时暂停 AI 瞄准（不检测不移动），松开恢复
hotkey_pause = F10
; 重载配置键，按下后重新读取 config.ini，无需重启程序
hotkey_reload_config = F11

[Mouse]
; 鼠标 DPI，必须与实际鼠标硬件 DPI 一致，否则移动距离会偏大或偏小
mouse_dpi = 1400
; 游戏内鼠标灵敏度，必须与游戏内设置一致，不匹配会导致瞄准过冲或不足
mouse_sensitivity = 3.0
; 游戏水平视场角（度），影响"像素偏移→角度→鼠标移动"的换算
mouse_fov_width = 40
; 游戏垂直视场角（度）
mouse_fov_height = 40
; 鼠标移动最小速度倍率，目标距离中心较远时使用的速度下限，1.0 = 标准速度
mouse_min_speed_multiplier = 1.0
; 鼠标移动最大速度倍率，目标接近中心时的速度上限，值越大近距离追踪越快但容易抖动
mouse_max_speed_multiplier = 1.5
; 是否锁定目标，True = 锁定后持续追踪不切换到更近的新目标，False = 始终追踪最近目标
mouse_lock_target = False
; 是否自动瞄准（无需按键），True = 检测到目标就自动移动鼠标，极易被检测为作弊
mouse_auto_aim = False
; 鼠标移动死区，取整后的移动量小于此值时不发送移动指令。值越大锁住后越稳定但精度越低，建议 1-3
mouse_dead_zone = 2

[Shooting]
; 是否自动射击，True = 准星在目标范围内时自动按下鼠标左键，需配合瞄准键使用
auto_shoot = False
; 是否启用瞬狙模式，True = 不需按住瞄准键，准星扫过目标就瞬间开火，更激进也更易被检测
triggerbot = False
; 是否强制开火，True = 忽略 bScope 检查，只要检测到目标就开火，可能导致打空
force_click = False
; bScope 判定倍率，控制"准星是否在目标范围内"的判定区域大小，1.0 = 完整目标框，0.5 = 缩小一半
bscope_multiplier = 1.0

[Recoil]
; 是否启用后坐力补偿，True = 开火时自动根据武器后坐力曲线下压/左右修正准星
recoil_enable = False
; 后坐力补偿整体缩放倍率，1.0 = 使用下方表格原始值。补偿过大调小、过小调大，建议每次 ±0.2
recoil_scale = 1.0
; 武器射速（发/秒），Vandal=9.75, Phantom=11, Spectre=12.48, Guardian=5.25
recoil_fire_rate = 9.75
; 压枪曲线总时长（秒），在此时间内均匀执行完所有子弹的补偿后自动停止
; 松开左键再按下才会重新触发。设为 0 则改用 recoil_fire_rate 控制节奏
recoil_duration = 2.7
; 后坐力补偿曲线，格式: dx,dy; dx,dy; ...（每发一对，用分号分隔）
;   dx > 0 = 向右补偿（抵消枪口左偏），dx < 0 = 向左
;   dy > 0 = 向下补偿（抵消枪口上漂），dy < 0 = 向上
; 每对数值含义: 该发子弹的**总补偿量**（鼠标计数），运行时按实际 DPI/灵敏度换算，帧率无关
; 基准: DPI=800, sensitivity=1.0。DPI 越高/灵敏度越高，实际补偿越大
; 标定方法: 训练场对墙打完一弹匣，观察弹孔分布，逐发调整 dx/dy
; ── 以下为 Vandal（狂徒）30 发默认补偿曲线（仅垂直下压，无左右修正）──
; 1-3发 强力垂直上升 | 4-9发 持续上漂 | 10-15发 中段稳定 | 16-25发 逐渐减弱 | 26-30发 尾部平稳
recoil_pattern = 0,12; 0,18; 0,24; 0,21; 0,19; 0,18; 0,16; 0,15; 0,13; 0,12; 0,10; 0,9; 0,7; 0,7; 0,6; 0,6; 0,4; 0,4; 0,4; 0,3; 0,3; 0,3; 0,3; 0,1.5; 0,1.5; 0,1.5; 0,1; 0,1; 0,1; 0,1

[Arduino]
; 是否通过 Arduino 发送鼠标移动指令（硬件级 HID，反作弊最难检测），需外接 Arduino + USB Host Shield
arduino_move = False
; 是否通过 Arduino 发送鼠标点击指令，与 arduino_move 配合实现全硬件级输入
arduino_shoot = False
; Arduino 串口端口，auto = 自动检测，也可手动指定如 COM3
arduino_port = auto
; 串口波特率，必须与 Arduino 固件中设置的一致。常见值 9600 / 115200
arduino_baudrate = 9600
; 是否使用 16 位鼠标数据，True = 单次发送完整 16 位坐标，False = 拆分为多个 8 位值（兼容性更好）
arduino_16_bit_mouse = False

[CH9329]
; 是否通过 CH9329 芯片发送鼠标移动指令（串口转 HID，硬件级模拟，反作弊最难检测）
; CH9329 是沁恒生产的串口转 USB 键鼠芯片，将串口数据转为标准 USB HID 设备信号
ch9329_move = True
; 是否通过 CH9329 发送鼠标点击指令，与 ch9329_move 配合实现全硬件级输入
ch9329_shoot = True
; CH9329 串口端口，auto = 自动检测（扫描 CH340/CH9329 设备），也可手动指定如 COM4
ch9329_port = auto
; 串口波特率，必须与 CH9329 固件设置一致。常见值 9600 / 115200
ch9329_baudrate = 9600
; 屏幕宽度（像素），绝对坐标模式需要，用于计算 0-4096 映射。auto = 自动获取主显示器分辨率
ch9329_screen_width = auto
; 屏幕高度（像素）。auto = 自动获取
ch9329_screen_height = auto

[AI]
; 是否使用加密模型（True = 通过卡密验证加载 .enc 加密模型，False = 直接加载 .onnx 明文模型用于调试）
ai_model_use_enc = True
; AI 模型文件名（放在 models/ 目录下），支持 .pt / .onnx / .engine 格式
ai_model_name = sunxds_0.8.0.onnx
; 模型输入图像尺寸，必须与模型训练/导出时的尺寸一致。常见值 320 / 416 / 640
ai_model_image_size = 640
; 置信度阈值，低于此值的检测结果被丢弃。值越低检出越多但误报越多，建议 0.15-0.35
ai_conf = 0.35
; 推理设备。cpu = CPU 推理；0 = 第一张 CUDA GPU。ONNX 模式下固定 cpu（由 DirectML 接管 GPU 加速）
ai_device = cpu
; 是否启用 AMD ROCm/HIP 加速，仅适用于 .pt 模型，ONNX 模式不需要
ai_enable_amd = False
; 是否禁用 ByteTrack 目标追踪器，False = 启用跨帧追踪（瞄准更稳定），True = 每帧独立检测
disable_tracker = False

[overlay]
; 是否显示透明叠加层（全屏透明窗口在游戏画面上绘制检测信息），仅 Windows 支持透明
show_overlay = False
; 是否在叠加层显示检测窗口边框（红色矩形/圆形，标示 AI 检测范围）
overlay_show_borders = True
; 是否在叠加层显示目标检测框（绿色矩形）
overlay_show_boxes = False
; 是否在叠加层显示瞄准线（屏幕中心→目标的黄色连线）
overlay_show_target_line = False
; 是否在叠加层显示预测位置线（屏幕中心→预测目标位置的紫色连线）
overlay_show_target_prediction_line = False
; 是否在检测框旁显示类别名称（如 player / head）
overlay_show_labels = False
; 是否显示置信度数值（如 player 0.87）
overlay_show_conf = False

[Debug window]
; 是否显示 OpenCV 调试窗口（实时显示截取画面和检测结果），强烈影响性能，正式使用时建议关闭
show_window = False
; 是否在调试窗口显示推理速度（预处理/推理/后处理各耗时，毫秒）
show_detection_speed = True
; 是否显示调试窗口自身的刷新 FPS
show_window_fps = False
; 是否在调试窗口绘制检测框（绿色矩形）
show_boxes = True
; 是否在调试窗口显示类别名称
show_labels = False
; 是否在调试窗口显示置信度
show_conf = True
; 是否在调试窗口显示瞄准线（中心→目标）
show_target_line = False
; 是否在调试窗口显示预测位置线
show_target_prediction_line = False
; 是否显示 bScope 判定框（红色矩形，框内显示 True/False 表示是否自动开火）
show_bscope_box = False
; 是否显示目标历史轨迹点（红色小点，记录过去 30 帧的位置）
show_history_points = False
; 调试窗口是否置顶（始终显示在最前面不被游戏遮挡），仅 Windows 有效
debug_window_always_on_top = True
; 调试窗口启动位置的 X 坐标（屏幕像素）
spawn_window_pos_x = 100
; 调试窗口启动位置的 Y 坐标（屏幕像素）
spawn_window_pos_y = 100
; 调试窗口缩放比例（%），100 = 原始大小，200 = 放大 2 倍，不影响实际检测精度
debug_window_scale_percent = 100
; 截图热键，按下后将调试窗口当前画面保存到 screenshots/ 目录
debug_window_screenshot_key = End
; 是否开启 Raw Input 调试日志，True = 打印所有键盘事件，False = 静默运行
log_debug_raw_input = False
; 是否开启瞄准调试日志，True = 按住瞄准键时实时打印目标位置和鼠标移动数据
log_debug_aim = False
; 是否开启各阶段耗时统计，True = 每轮迭代打印等待帧到达/ONNX推理/ByteTrack/瞄准鼠标/总耗时
log_debug_timing = False
